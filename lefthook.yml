pre-commit:
  parallel: true
  commands:
    go:
      glob:
        - "*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true

    typescript:
      glob:
        - "*.{ts,tsx,vue,css,json}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    go-test:
      glob:
        - "*.go"
      run: go test ./...
    vitest:
      run: bun run test
    playwright:
      run: bun run playwright
